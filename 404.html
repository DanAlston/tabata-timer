<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Tabata Timer</title>
    <script type="text/javascript">
        // Single Page Apps on GitHub Pages don't support client-side routing
        // This 404.html redirect handles the issue
        var segmentCount = 0;
        var l = window.location;
        l.replace(
            l.protocol,
            l.hostname,
            l.pathname.split('/').slice(0, 1 + segmentCount).join('/')
        );
    </script>
</head>
<body>
    <h1>Redirecting...</h1>
</body>
</html>
